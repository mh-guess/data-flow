# Prefect Deployment Configuration
# Deploy all: prefect deploy --all --no-prompt
# Deploy one: prefect deploy -n tiingo_to_s3_flow --no-prompt

deployments:
  - name: tiingo_to_s3_flow
    description: "ETL pipeline that fetches daily price data from Tiingo API and loads to S3"
    entrypoint: tiingo_to_s3_flow.py:tiingo_to_s3_flow
    schedules:
      - cron: "0 18 * * 1-5"
        timezone: "America/Los_Angeles"
        active: true
    work_pool:
      name: "default-work-pool"
    build: null
    pull:
      - prefect.deployments.steps.git_clone:
          repository: https://github.com/mh-guess/data-flow.git
          branch: main

  - name: tiingo_backfill_flow
    description: "On-demand historical data backfill with year-level partitioning (load_type=retro)"
    entrypoint: tiingo_backfill_flow.py:tiingo_backfill_flow
    schedules: []
    parameters:
      start_year: 2020
      end_year: 2024
    work_pool:
      name: "default-work-pool"
    build: null
    pull:
      - prefect.deployments.steps.git_clone:
          repository: https://github.com/mh-guess/data-flow.git
          branch: main

  - name: tiingo_fundamentals_flow
    description: "Daily pipeline for Tiingo fundamentals (daily metrics, statements, definitions, meta)"
    entrypoint: tiingo_fundamentals_flow.py:tiingo_fundamentals_flow
    schedules:
      - cron: "0 18 * * 1-5"
        timezone: "America/Los_Angeles"
        active: true
    work_pool:
      name: "default-work-pool"
    build: null
    pull:
      - prefect.deployments.steps.git_clone:
          repository: https://github.com/mh-guess/data-flow.git
          branch: main

  - name: tiingo_fundamentals_backfill_flow
    description: "On-demand historical fundamentals backfill with year-level partitioning"
    entrypoint: tiingo_fundamentals_backfill_flow.py:tiingo_fundamentals_backfill_flow
    schedules: []
    parameters:
      start_year: 2020
      end_year: 2024
    work_pool:
      name: "default-work-pool"
    build: null
    pull:
      - prefect.deployments.steps.git_clone:
          repository: https://github.com/mh-guess/data-flow.git
          branch: main

  - name: vol_table_flow
    description: "Daily volatility table for APEX trading system (per-minute vol estimates)"
    entrypoint: vol_table_flow.py:vol_table_flow
    schedules:
      - cron: "0 18 * * 1-5"
        timezone: "America/New_York"
        active: true
    work_pool:
      name: "default-work-pool"
    build: null
    pull:
      - prefect.deployments.steps.git_clone:
          repository: https://github.com/mh-guess/data-flow.git
          branch: main
